<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!------------------ CSS ------------------>
    <link rel="stylesheet" href="../CSS/design-system.css">
    <link rel="stylesheet" href="../CSS/admin-login.css">

    <!------------------ Box Icons  ------------------>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <title>Admin | Locks & Looks</title>

</head>

  <body>
    <div id="toast-container" aria-live="polite"></div>

    <div class="admin-shell">
      <div class="admin-brand">
        <div class="admin-brand-content">
          <span class="badge"><i class='bx bx-shield'></i> Admin</span>
          <h1>Locks &amp; Looks<br>Control Center</h1>
          <p>Manage services, customers, and your team from one place.</p>
        </div>
      </div>

      <div class="login-box">
        <h2>Sign in</h2>
        <form action="">
          <div class="user-box">
            <input type="email" id="email" required>
            <label><i class='bx bx-user'></i> &nbsp; Email</label>
          </div>
          <div class="user-box">
            <input type="password" id="password" required>
            <label><i id="keyicon" class='bx bx-key'></i> &nbsp; Password</label>
          </div>
          <a href="#" class="submit">SIGN IN</a>
        </form>
      </div>
    </div>
  </body>

</html>

<script src="../scripts/toast.js"></script>
<script src="../scripts/admin.js"></script>
